set default=0
set timeout=0

insmod all_video

menuentry "vendiOS" {
    set gfxpayload=keep
    linux   /arch/boot/x86_64/vmlinuz-linux archisobasedir=arch archisolabel=%ARCHISO_LABEL% \
            quiet loglevel=0 rd.systemd.show_status=false rd.udev.log_level=3 \
            systemd.show_status=false vt.global_cursor_default=0
    initrd  /arch/boot/x86_64/initramfs-linux.img
}
