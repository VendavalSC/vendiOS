# vendiOS — kitty config.
# Drop-in for the old Alacritty look (Catppuccin Mocha + Mauve accent,
# JetBrains Mono Nerd Font) with kitty's upgrades: GPU rendering, inline
# images (kitty graphics protocol), and an animated gliding cursor trail.
# Window opacity is intentionally NOT set here — the compositor owns it
# (vendiwm super+shift+o opacity cycle), same as it did for alacritty.

include theme.conf

# ── font ───────────────────────────────────────────────────────────────────
font_family      JetBrainsMonoNL Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.5

# ── window ─────────────────────────────────────────────────────────────────
window_padding_width    12 14
hide_window_decorations yes
confirm_os_window_close 0

# ── cursor (the upgrade: a smooth gliding trail) ────────────────────────────
cursor_shape                 block
cursor_shape_unfocused       hollow
cursor_blink_interval        0.6
cursor_stop_blinking_after   0
cursor_trail                 3
cursor_trail_decay           0.1 0.4
cursor_trail_start_threshold 1

# ── behaviour ───────────────────────────────────────────────────────────────
scrollback_lines  10000
copy_on_select    yes
enable_audio_bell no

# shift+enter parity with the old alacritty bind (ESC + CR)
map shift+enter send_text all \x1b\r

# kitty reloads this file (+ includes) on SIGUSR1 — `vendi theme` uses that to
# live-recolor open terminals (the alacritty config auto-reloaded; kitty needs
# the signal).
