# vendiOS — Alacritty config.
# Catppuccin Mocha + Mauve accent, JetBrains Mono Nerd Font.

[window]
opacity = 1.0
padding = { x = 14, y = 12 }
dynamic_padding = true
decorations = "None"
title = "vendi"
dynamic_title = true

[font]
size = 12.5
normal = { family = "JetBrainsMonoNL Nerd Font Mono", style = "Regular" }
bold   = { family = "JetBrainsMonoNL Nerd Font Mono", style = "Bold" }
italic = { family = "JetBrainsMonoNL Nerd Font Mono", style = "Italic" }
bold_italic = { family = "JetBrainsMonoNL Nerd Font Mono", style = "Bold Italic" }

[cursor]
style = { shape = "Beam", blinking = "On" }
blink_interval = 600
unfocused_hollow = true

[scrolling]
history = 10000

[selection]
save_to_clipboard = true

# ── Catppuccin Mocha ───────────────────────────────────────────────────────
[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"
dim_foreground = "#cdd6f4"
