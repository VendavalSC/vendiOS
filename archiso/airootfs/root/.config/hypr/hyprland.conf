monitor=,preferred,auto,1

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0
    col.active_border = rgba(00000000)
    col.inactive_border = rgba(00000000)
}

decoration {
    rounding = 0
    shadow {
        enabled = false
    }
    blur {
        enabled = false
    }
}

animations {
    enabled = false
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vfr = true
    background_color = 0x1e1e2e
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
}

# fullscreen rule for foot
windowrulev2 = fullscreen, class:foot

# launch installer — exit Hyprland when foot closes
exec-once = foot --fullscreen /usr/local/bin/vendi-boot; hyprctl dispatch exit 0
