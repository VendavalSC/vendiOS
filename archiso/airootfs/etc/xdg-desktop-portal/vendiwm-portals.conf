# Portal backend routing for the vendiwm session (matched via
# XDG_CURRENT_DESKTOP=vendiwm). The wlroots backend serves ScreenCast /
# Screenshot through wlr-screencopy (which vendiwm implements); GTK handles
# the file chooser, settings, and everything else.
[preferred]
default=gtk
org.freedesktop.impl.portal.ScreenCast=wlr
org.freedesktop.impl.portal.Screenshot=wlr
